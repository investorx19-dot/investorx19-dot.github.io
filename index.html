<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Jogos - Mega-Sena</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f7fb;
      color: #111827;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 28px;
    }
    h2, h3 {
      text-align: center;
    }
    #login, #app {
      max-width: 700px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .topo-marca {
  text-align: center;
  margin-bottom: 24px;
}

.logo-topo {
  width: 140px;
  display: block;
  margin: 0 auto 10px auto;
}
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 6px 4px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }
    .acoes-login, .botoes-planos {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }
    .linha {
      margin: 15px 0;
      padding: 12px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }
    .numero {
      display: inline-block;
      width: 38px;
      height: 38px;
      line-height: 38px;
      text-align: center;
      margin: 2px;
      font-weight: bold;
      border-radius: 6px;
      background: #e5e7eb;
    }
    .selecionado {
      background: yellow;
      color: black;
    }
    .topo-app {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .usuario-logado {
      font-size: 14px;
      color: #374151;
      background: #eef2ff;
      padding: 8px 12px;
      border-radius: 999px;
    }
    .centro, .mensagem {
      text-align: center;
    }
    .mensagem {
      margin-bottom: 18px;
      color: #4b5563;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="topo-marca">
  <img src="logo-marck6.jpg" alt="Mark6" class="logo-topo">
  <div class="topo-marca">
  <img src="logo-marck6.jpg" class="logo-topo">
  <h1>Gerador de Jogos - Mega-Sena</h1>
</div>

  <div id="login">
    <h2>Cadastro / Login</h2>
    <p class="mensagem">Cadastre-se com nome, e-mail e telefone. Seu acesso será liberado automaticamente.</p>

    <input id="nome" placeholder="Nome" />
    <input id="email" type="email" placeholder="E-mail" />
    <input id="telefone" placeholder="Telefone" />

    <div class="acoes-login">
      <button id="btnCadastrar" type="button">Cadastrar</button>
      <button id="btnEntrar" type="button">Entrar</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="topo-app">
      <div class="usuario-logado" id="usuarioLogado">Usuário logado</div>
      <button id="btnSair" type="button">Sair</button>
    </div>

    <div class="centro">
      <button id="btnGerar" type="button">GERAR JOGO</button>
    </div>

    <h2>Cartão Virtual</h2>
    <div id="cartao"></div>

    <p class="centro">
      <strong>Acertos no último sorteio:</strong>
      <span id="acertos">0</span>
    </p>

    <h3>Assinatura para liberar o gerador</h3>
    <div class="botoes-planos">
      <button id="btnMensal" type="button">Assinatura Mensal - R$ 29,90</button>
      <button id="btnAnual" type="button">Assinatura Anual - R$ 238,80</button>
    </div>
  </div>

  <script type="module">
    import { gerarJogoValido, LINE_RANGES } from "./gerador.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where,
      addDoc
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9ccyTSDoWiqrwnq9K7nAEjeOHZahKIu0",
      authDomain: "painel-megasena.firebaseapp.com",
      projectId: "painel-megasena",
      storageBucket: "painel-megasena.firebasestorage.app",
      messagingSenderId: "924943702876",
      appId: "1:924943702876:web:77929086c5addb13b37f99"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);

    const elNome = document.getElementById("nome");
    const elEmail = document.getElementById("email");
    const elTelefone = document.getElementById("telefone");
    const elLogin = document.getElementById("login");
    const elApp = document.getElementById("app");
    const elUsuarioLogado = document.getElementById("usuarioLogado");
    const elCartao = document.getElementById("cartao");
    const elAcertos = document.getElementById("acertos");

    const btnCadastrar = document.getElementById("btnCadastrar");
    const btnEntrar = document.getElementById("btnEntrar");
    const btnGerar = document.getElementById("btnGerar");
    const btnSair = document.getElementById("btnSair");
    const btnMensal = document.getElementById("btnMensal");
    const btnAnual = document.getElementById("btnAnual");

    let usuarioAtual = null;

    function normalizarEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function normalizarTelefone(telefone) {
      return String(telefone || "").replace(/\D/g, "");
    }

    function atualizarUsuarioLogado() {
      if (!usuarioAtual) {
        elUsuarioLogado.textContent = "Usuário logado";
        return;
      }
      elUsuarioLogado.textContent = "Logado: " + usuarioAtual.nome + " - " + usuarioAtual.email;
    }

    function mostrarApp() {
      elLogin.style.display = "none";
      elApp.style.display = "block";
      atualizarUsuarioLogado();
      renderCartao([]);
      elAcertos.textContent = "0";
    }

    function mostrarLogin() {
      elLogin.style.display = "block";
      elApp.style.display = "none";
    }

    async function buscarUsuarioPorEmail(email) {
      const consulta = query(
        collection(db, "users"),
        where("email", "==", normalizarEmail(email))
      );

      const snap = await getDocs(consulta);
      if (snap.empty) return null;

      let usuarioMaisRecente = null;

      snap.forEach(function(item) {
        const dados = item.data();
        const usuario = {
          id: item.id,
          nome: dados.nome || "",
          email: dados.email || "",
          telefone: dados.telefone || dados.phone || "",
          accessGranted: !!dados.accessGranted,
          createdAt: Number(dados.createdAt || 0),
          updatedAt: Number(dados.updatedAt || 0)
        };

        if (!usuarioMaisRecente) {
          usuarioMaisRecente = usuario;
        } else {
          const tempoAtual = Number(usuario.updatedAt || usuario.createdAt || 0);
          const tempoSalvo = Number(usuarioMaisRecente.updatedAt || usuarioMaisRecente.createdAt || 0);
          if (tempoAtual >= tempoSalvo) {
            usuarioMaisRecente = usuario;
          }
        }
      });

      return usuarioMaisRecente;
    }

    async function cadastrar() {
      const nome = elNome.value.trim();
      const email = normalizarEmail(elEmail.value);
      const telefone = normalizarTelefone(elTelefone.value);

      if (!nome || !email || !telefone) {
        alert("Preencha nome, e-mail e telefone.");
        return;
      }

      try {
        const existente = await buscarUsuarioPorEmail(email);
        if (existente) {
          alert("Este e-mail já está cadastrado. Use o botão Entrar.");
          return;
        }

        const novoUsuario = {
          nome: nome,
          email: email,
          telefone: telefone,
          accessGranted: true,
          createdAt: Date.now(),
          updatedAt: Date.now()
        };

        const referencia = await addDoc(collection(db, "users"), novoUsuario);

        usuarioAtual = {
          id: referencia.id,
          nome: nome,
          email: email,
          telefone: telefone,
          accessGranted: true,
          createdAt: novoUsuario.createdAt,
          updatedAt: novoUsuario.updatedAt
        };

        mostrarApp();
        alert("Cadastro realizado com sucesso. Acesso liberado automaticamente.");
      } catch (erro) {
        console.error("Erro no cadastro:", erro);
        alert("Erro ao cadastrar usuário: " + erro.message);
      }
    }

    async function login() {
      const email = normalizarEmail(elEmail.value);
      const telefone = normalizarTelefone(elTelefone.value);

      if (!email || !telefone) {
        alert("Informe e-mail e telefone.");
        return;
      }

      try {
        const user = await buscarUsuarioPorEmail(email);

        if (!user) {
          alert("Usuário não encontrado.");
          return;
        }

        const telefoneSalvo = normalizarTelefone(user.telefone);
        if (telefoneSalvo !== telefone) {
          alert("Telefone inválido.");
          return;
        }

        if (!user.accessGranted) {
          alert("Seu acesso foi bloqueado pelo administrador.");
          return;
        }

        usuarioAtual = user;
        mostrarApp();
      } catch (erro) {
        console.error("Erro no login:", erro);
        alert("Erro ao fazer login: " + erro.message);
      }
    }

    async function gerarJogoUsuario() {
      try {
        if (!usuarioAtual) {
          alert("Faça login para gerar seu jogo.");
          return;
        }

        const usuarioAtualizado = await buscarUsuarioPorEmail(usuarioAtual.email);

        if (!usuarioAtualizado) {
          alert("Usuário não encontrado.");
          usuarioAtual = null;
          mostrarLogin();
          return;
        }

        if (!usuarioAtualizado.accessGranted) {
          alert("Seu acesso foi bloqueado pelo administrador.");
          usuarioAtual = null;
          mostrarLogin();
          return;
        }

        usuarioAtual = usuarioAtualizado;
        atualizarUsuarioLogado();

        const configRef = doc(db, "config", "global");
        const configSnap = await getDoc(configRef);

        if (!configSnap.exists()) {
          alert("Configuração global não encontrada.");
          return;
        }

        const config = configSnap.data();
        const linhasAtivas = config.linhasAtivas || [];
        const anteriores = config.dezenasAnteriores || [];
        const atrasadas = config.dezenasAtrasadas || [];

        if (linhasAtivas.length === 0) {
          alert("O administrador ainda não configurou as linhas ativas.");
          return;
        }

        const excluidas = new Set();
        anteriores.forEach(function(numero) { excluidas.add(numero); });
        atrasadas.forEach(function(numero) { excluidas.add(numero); });

        const jogo = gerarJogoValido(linhasAtivas, excluidas);
        renderCartao(jogo);

        let acertos = 0;
        jogo.forEach(function(numero) {
          if (anteriores.includes(numero)) acertos++;
        });

        elAcertos.textContent = String(acertos);
      } catch (erro) {
        console.error("Erro ao gerar jogo:", erro);
        alert("Erro ao gerar jogo: " + erro.message);
      }
    }

    function renderCartao(jogo) {
      elCartao.innerHTML = "";

      for (let l = 1; l <= 6; l++) {
        const div = document.createElement("div");
        div.className = "linha";

        const titulo = document.createElement("strong");
        titulo.textContent = "Linha " + l + " (" + LINE_RANGES[l][0] + "-" + LINE_RANGES[l][9] + "): ";
        div.appendChild(titulo);

        LINE_RANGES[l].forEach(function(n) {
          const span = document.createElement("span");
          span.className = "numero";
          span.textContent = String(n).padStart(2, "0");

          if (jogo.includes(n)) {
            span.classList.add("selecionado");
          }

          div.appendChild(span);
        });

        elCartao.appendChild(div);
      }
    }

    function sair() {
      usuarioAtual = null;
      elNome.value = "";
      elEmail.value = "";
      elTelefone.value = "";
      mostrarLogin();
    }

    btnCadastrar.addEventListener("click", cadastrar);
    btnEntrar.addEventListener("click", login);
    btnGerar.addEventListener("click", gerarJogoUsuario);
    btnSair.addEventListener("click", sair);

    btnMensal.addEventListener("click", function() {
      window.open("https://invoice.infinitepay.io/plans/silvia-regina-967/ito0zFDGX", "_blank");
    });

    btnAnual.addEventListener("click", function() {
      window.open("https://invoice.infinitepay.io/plans/silvia-regina-967/1Cpgone7Tx", "_blank");
    });
  </script>
</body>
</html>
